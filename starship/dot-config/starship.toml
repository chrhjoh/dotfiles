add_newline = false
palette = "catppuccin_mocha"

[character]
error_symbol = "[[󰄛 ](red)❯](peach)"
success_symbol = "[[󰄛 ](green)❯](peach)"

[cmd_duration]
disabled = true

[conda]
format = "[$symbol$environment]($style) "

[directory]
style = "bold flamingo"

[git_branch]
format = "on [$symbol$branch(:$remote_branch)]($style) "
style = "bold mauve"

[git_status]
style = "bold mauve"

[nix_shell]
format = "[$symbol $state( ($name))]($style) "
symbol = "❄️"

[package]
disabled = true

[palettes.catppuccin_mocha]
base = "#1e1e2e"
blue = "#89b4fa"
crust = "#11111b"
flamingo = "#f2cdcd"
green = "#a6e3a1"
lavender = "#b4befe"
mantle = "#181825"
maroon = "#eba0ac"
mauve = "#cba6f7"
overlay0 = "#6c7086"
overlay1 = "#7f849c"
overlay2 = "#9399b2"
peach = "#fab387"
pink = "#f5c2e7"
red = "#f38ba8"
rosewater = "#f5e0dc"
sapphire = "#74c7ec"
sky = "#89dceb"
subtext0 = "#a6adc8"
subtext1 = "#bac2de"
surface0 = "#313244"
surface1 = "#45475a"
surface2 = "#585b70"
teal = "#94e2d5"
text = "#cdd6f4"
yellow = "#f9e2af"

[python]
format = "[($symbol($virtualenv))]($style) "
style = "bold yellow"
symbol = " "

[rust]
format = "[$symbol ($version)]($style) "
style = "bold red"
symbol = " "
